services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolx-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: schoolx
      POSTGRES_PASSWORD: schoolx
      POSTGRES_DB: schoolx
    volumes:
      - schoolx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolx -d schoolx"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  schoolx_pg_data:
